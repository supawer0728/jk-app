<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="file:///android_asset/toastui-editor.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 4px; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <script src="file:///android_asset/toastui-editor-viewer.min.js"></script>
  <script>
    var ALLOWED_IFRAME_HOSTS = ['www.youtube.com', 'youtube.com', 'youtu.be', 'player.vimeo.com'];

    var viewer = toastui.Editor.factory({
      el: document.querySelector('#viewer'),
      viewer: true,
      initialValue: '',
      customHTMLRenderer: {
        htmlBlock: {
          iframe: function(node) {
            var src = (node.attrs && node.attrs.src) || '';
            var allowed = false;
            try {
              var url = new URL(src);
              allowed = url.protocol === 'https:' && ALLOWED_IFRAME_HOSTS.indexOf(url.hostname) >= 0;
            } catch (e) {}
            if (!allowed) return [];
            return [
              { type: 'openTag', tagName: 'iframe', selfClose: false, attributes: node.attrs },
              { type: 'closeTag', tagName: 'iframe' }
            ];
          }
        }
      }
    });

    function reportHeight() {
      Android.onHeightChanged(document.body.scrollHeight);
    }

    function setContent(markdown) {
      viewer.setMarkdown(markdown);
      requestAnimationFrame(function() { requestAnimationFrame(reportHeight); });
      setTimeout(reportHeight, 400);
    }
  </script>
</body>
</html>

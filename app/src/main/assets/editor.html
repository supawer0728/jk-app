<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="file:///android_asset/toastui-editor.min.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #editor { height: 100vh; }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="file:///android_asset/toastui-editor.min.js"></script>
  <script>
    var editor = new toastui.Editor({
      el: document.querySelector('#editor'),
      height: '100vh',
      initialEditType: 'markdown',
      previewStyle: 'tab',
      toolbarItems: [
        ['heading', 'bold', 'italic', 'strike'],
        ['hr', 'quote'],
        ['ul', 'ol', 'task', 'indent', 'outdent'],
        ['table', 'link'],
        ['code', 'codeblock']
      ],
      events: {
        change: function() {
          Android.onMarkdownChanged(editor.getMarkdown());
        }
      }
    });

    function setContent(markdown) {
      editor.setMarkdown(markdown);
    }
  </script>
</body>
</html>
